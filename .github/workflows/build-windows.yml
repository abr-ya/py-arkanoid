name: Build Windows executable

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - "feature/**"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows executable
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Smoke check packaged executable
        shell: pwsh
        run: ./dist/windows/arkanoid.exe --smoke

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: arkanoid-windows
          path: dist/windows/arkanoid.exe
